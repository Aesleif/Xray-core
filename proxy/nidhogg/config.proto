syntax = "proto3";

package xray.proxy.nidhogg;
option go_package = "github.com/xtls/xray-core/proxy/nidhogg";

message ClientConfig {
  string server_address = 1;
  uint32 server_port = 2;
  // private_key is the base64-encoded 64-byte Ed25519 private key
  // (32-byte seed || 32-byte pubkey).
  string private_key = 3;
  string tunnel_path = 4;
  string fingerprint = 5;
  string shaping_mode = 6;
  int32 connection_pool_size = 8;
  string idle_timeout = 9;
  string connection_max_age = 10;
}

message ServerConfig {
  // authorized_keys holds the set of client public keys allowed to
  // open tunnels. Each entry is "<base64-pubkey>" or
  // "<base64-pubkey> <name>" (the optional name is used only in logs).
  repeated string authorized_keys = 1;
  string proxy_to = 2;
  string tunnel_path = 3;
  repeated string profile_targets = 4;
  string profile_interval = 5;
  int32 profile_min_snapshots = 6;
  int32 telemetry_threshold = 7;
}
